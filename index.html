<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars Colonization: Daily Mission Log</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #00FF41;
            font-family: 'Courier New', monospace;
            display: flex;
            overflow: hidden;
            height: 100vh;
        }
        #canvas-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            order: 2;
        }
        #ui-panel {
            width: 350px;
            padding: 25px;
            border-right: 2px solid #333;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            overflow-y: auto;
            order: 1;
        }
        h2 {
            border-bottom: 1px solid #00FF41;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1em;
            margin-top: 30px;
        }
        h2:first-child { margin-top: 0; }
        .math-board {
            background: #000;
            padding: 15px;
            border: 1px solid #222;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }
        .calendar-display {
            font-size: 1.4em;
            color: #fff;
            text-shadow: 0 0 10px #00FF41;
        }
        .telemetry-item {
            margin: 10px 0;
            font-size: 0.85em;
            display: flex;
            justify-content: space-between;
        }
        .label { color: #888; }
        .value { color: #00FF41; font-weight: bold; }
        .warning { color: #FF4400; font-weight: bold; }
        .delay { color: #FFAA00; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>Mission Calendar</h2>
    <div class="math-board">
        <div id="calendar" class="calendar-display">JAN 01, 2027</div>
    </div>

    <h2>Strategic Telemetry</h2>
    <div id="telemetry">
        <div class="telemetry-item"><span class="label">Earth Population:</span> <span id="earth-pop" class="value">8,000,000,000</span></div>
        <div class="telemetry-item"><span class="label">Mars Population:</span> <span id="colonist-count" class="value">0</span></div>
        <div class="telemetry-item"><span class="label">Missions Active:</span> <span id="active-count" class="value">0</span></div>
        <div class="telemetry-item"><span class="label">Total Failures:</span> <span id="failed-count" class="value">0</span></div>
        <div class="telemetry-item"><span class="label">Earth Status:</span> <span id="earth-status" class="value">WAITING</span></div>
        <div class="telemetry-item"><span class="label">Mars Status:</span> <span id="mars-status" class="value">WAITING</span></div>
    </div>
</div>

<div id="canvas-container">
    <canvas id="simCanvas"></canvas>
</div>

<script>
/**
 * MARS COLONIZATION SIMULATION ENGINE (V6.2)
 * * Physics: Linear Intercepts & Calendar-Driven Launches
 * Logistics: 1 Starship Launch per Day (100 passengers)
 * Traffic: Proximity sensors to delay launches if space is congested
 * Responsive: Orbits scale based on viewport size
 */

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const activeEl = document.getElementById('active-count');
const failedEl = document.getElementById('failed-count');
const colonistEl = document.getElementById('colonist-count');
const earthPopEl = document.getElementById('earth-pop');
const earthStatusEl = document.getElementById('earth-status');
const marsStatusEl = document.getElementById('mars-status');
const calendarEl = document.getElementById('calendar');

let scaleFactor = 1;

function resize() {
    canvas.width = window.innerWidth - 350;
    canvas.height = window.innerHeight;
    // Base design was for ~800px width. Adjust scale to fit largest orbit (Jupiter ~350)
    scaleFactor = Math.min(canvas.width, canvas.height) / 850;
}
window.addEventListener('resize', resize);
resize();

const SUN_BASE_RADIUS = 18;
const DANGER_ZONE_BASE = 70;
const TRAFFIC_SAFE_DISTANCE = 15;

const planets = [
    { name: 'Mercury', dist: 65,  radius: 2, period: 88,   color: '#A5A5A5', angle: Math.random() * 6 },
    { name: 'Venus',   dist: 100, radius: 4, period: 225,  color: '#E3BB76', angle: Math.random() * 6 },
    { name: 'Earth',   dist: 150, radius: 5, period: 365,  color: '#2271B3', angle: 0 },
    { name: 'Mars',    dist: 230, radius: 3.5, period: 687, color: '#E27B58', angle: Math.PI / 4 },
    { name: 'Jupiter', dist: 350, radius: 11, period: 4333, color: '#D39C7E', angle: Math.random() * 6 }
];

let rockets = [];
let particles = [];
let totalFailures = 0;
let totalColonists = 0;
let earthPopulation = 8000000000;

let simDate = new Date(2027, 0, 1);
const MS_PER_DAY = 1000;
let lastDayUpdate = 0;

const ORBIT_SPEED = 0.0015;

class Particle {
    constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = (Math.random() * 3 + 0.5) * scaleFactor;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.015 + 0.005;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
    draw() {
        ctx.fillStyle = `rgba(255, 120, 0, ${this.life})`;
        ctx.fillRect(this.x, this.y, 2 * scaleFactor, 2 * scaleFactor);
    }
}

class Rocket {
    constructor(isOutbound) {
        this.leg = isOutbound ? 'OUTBOUND' : 'RETURN';
        this.progress = 0;
        this.speed = 0.003;
        this.status = 'ACTIVE';
        this.dockTime = 0;
        this.dockDuration = 100;

        this.willFail = Math.random() < 0.05;
        this.failTime = 0.2 + Math.random() * 0.6;

        this.calculatePath();
        this.updatePos();
    }

    isPathObstructed(x1, y1, x2, y2, cx, cy, r) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const t = ((cx - x1) * dx + (cy - y1) * dy) / (dx * dx + dy * dy);
        const closestX = x1 + Math.max(0, Math.min(1, t)) * dx;
        const closestY = y1 + Math.max(0, Math.min(1, t)) * dy;
        const dist = Math.sqrt((cx - closestX)**2 + (cy - closestY)**2);
        return dist < r;
    }

    calculatePath() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const earth = planets[2];
        const mars = planets[3];

        if (this.leg === 'OUTBOUND') {
            this.startX = centerX + Math.cos(earth.angle) * (earth.dist * scaleFactor);
            this.startY = centerY + Math.sin(earth.angle) * (earth.dist * scaleFactor);
            const travelTime = 1 / this.speed;
            const futureMarsAngle = mars.angle + ((ORBIT_SPEED / (mars.period / 365)) * travelTime);
            this.endX = centerX + Math.cos(futureMarsAngle) * (mars.dist * scaleFactor);
            this.endY = centerY + Math.sin(futureMarsAngle) * (mars.dist * scaleFactor);
        } else {
            const currentMarsX = centerX + Math.cos(mars.angle) * (mars.dist * scaleFactor);
            const currentMarsY = centerY + Math.sin(mars.angle) * (mars.dist * scaleFactor);
            this.startX = currentMarsX;
            this.startY = currentMarsY;
            const travelTime = 1 / this.speed;
            const futureEarthAngle = earth.angle + ((ORBIT_SPEED / (earth.period / 365)) * travelTime);
            this.endX = centerX + Math.cos(futureEarthAngle) * (earth.dist * scaleFactor);
            this.endY = centerY + Math.sin(futureEarthAngle) * (earth.dist * scaleFactor);
        }
    }

    updatePos() {
        if (this.leg === 'DOCKING') {
            const mars = planets[3];
            this.x = (canvas.width / 2) + Math.cos(mars.angle) * (mars.dist * scaleFactor);
            this.y = (canvas.height / 2) + Math.sin(mars.angle) * (mars.dist * scaleFactor);
        } else {
            this.x = this.startX + (this.endX - this.startX) * this.progress;
            this.y = this.startY + (this.endY - this.startY) * this.progress;
        }
    }

    update() {
        if (this.status !== 'ACTIVE') return;

        if (this.leg === 'DOCKING') {
            this.updatePos();
            this.dockTime++;
            if (this.dockTime >= this.dockDuration) {
                this.status = 'SUCCESS';
            }
            return;
        }

        this.progress += this.speed;

        if (this.willFail && this.progress >= this.failTime) {
            this.explode();
            return;
        }

        this.updatePos();

        if (this.progress >= 1.0) {
            if (this.leg === 'OUTBOUND') {
                totalColonists += 100;
                this.leg = 'DOCKING';
                this.dockTime = 0;
            } else {
                this.status = 'SUCCESS';
            }
        }
    }

    explode() {
        this.status = 'FAILED';
        totalFailures++;
        for (let i = 0; i < 40; i++) particles.push(new Particle(this.x, this.y));
    }

    draw() {
        if (this.status !== 'ACTIVE') return;
        ctx.save();
        ctx.translate(this.x, this.y);
        let angle = (this.leg === 'DOCKING') ? planets[3].angle + Math.PI/2 : Math.atan2(this.endY - this.startY, this.endX - this.startX) + Math.PI/2;
        ctx.rotate(angle);
        ctx.fillStyle = '#CCCCCC';
        ctx.fillRect(-1.5 * scaleFactor, -4 * scaleFactor, 3 * scaleFactor, 8 * scaleFactor);
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.moveTo(-1.5 * scaleFactor, -4 * scaleFactor);
        ctx.lineTo(1.5 * scaleFactor, -4 * scaleFactor);
        ctx.lineTo(0, -7 * scaleFactor);
        ctx.fill();
        if (this.leg !== 'DOCKING' && Math.random() > 0.2) {
            ctx.fillStyle = '#FF5500';
            ctx.beginPath();
            ctx.moveTo(-1 * scaleFactor, 4 * scaleFactor);
            ctx.lineTo(1 * scaleFactor, 4 * scaleFactor);
            ctx.lineTo(0, (8 + Math.random() * 5) * scaleFactor);
            ctx.fill();
        }
        ctx.restore();
    }
}

function updateCalendar() {
    const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    const d = simDate.getDate().toString().padStart(2, '0');
    const m = monthNames[simDate.getMonth()];
    const y = simDate.getFullYear();
    calendarEl.innerText = `${m} ${d}, ${y}`;
}

function isCongested(x, y) {
    const safeDist = TRAFFIC_SAFE_DISTANCE * scaleFactor;
    return rockets.some(r => {
        if (r.status !== 'ACTIVE') return false;
        const dx = r.x - x;
        const dy = r.y - y;
        return Math.sqrt(dx*dx + dy*dy) < safeDist;
    });
}

function handleDailyLaunches(centerX, centerY) {
    const earth = planets[2];
    const mars = planets[3];
    const rocketHelper = new Rocket(true);

    const startEX = centerX + Math.cos(earth.angle) * (earth.dist * scaleFactor);
    const startEY = centerY + Math.sin(earth.angle) * (earth.dist * scaleFactor);
    const travelTime = 1 / 0.003;
    const futureMarsAngle = mars.angle + ((ORBIT_SPEED / (mars.period / 365)) * travelTime);
    const endEX = centerX + Math.cos(futureMarsAngle) * (mars.dist * scaleFactor);
    const endEY = centerY + Math.sin(futureMarsAngle) * (mars.dist * scaleFactor);

    if (rocketHelper.isPathObstructed(startEX, startEY, endEX, endEY, centerX, centerY, DANGER_ZONE_BASE * scaleFactor)) {
        earthStatusEl.innerText = "OBSTRUCTED";
        earthStatusEl.className = "warning";
    } else if (isCongested(startEX, startEY)) {
        earthStatusEl.innerText = "TRAFFIC DELAY";
        earthStatusEl.className = "delay";
    } else {
        if (earthPopulation >= 100) {
            rockets.push(new Rocket(true));
            earthPopulation -= 100;
            earthStatusEl.innerText = "LAUNCHED";
            earthStatusEl.className = "value";
        }
    }

    const startMX = centerX + Math.cos(mars.angle) * (mars.dist * scaleFactor);
    const startMY = centerY + Math.sin(mars.angle) * (mars.dist * scaleFactor);
    const futureEarthAngle = earth.angle + ((ORBIT_SPEED / (earth.period / 365)) * travelTime);
    const endMX = centerX + Math.cos(futureEarthAngle) * (earth.dist * scaleFactor);
    const endMY = centerY + Math.sin(futureEarthAngle) * (earth.dist * scaleFactor);

    if (rocketHelper.isPathObstructed(startMX, startMY, endMX, endMY, centerX, centerY, DANGER_ZONE_BASE * scaleFactor)) {
        marsStatusEl.innerText = "OBSTRUCTED";
        marsStatusEl.className = "warning";
    } else if (isCongested(startMX, startMY)) {
        marsStatusEl.innerText = "TRAFFIC DELAY";
        marsStatusEl.className = "delay";
    } else {
        rockets.push(new Rocket(false));
        marsStatusEl.innerText = "LAUNCHED";
        marsStatusEl.className = "value";
    }
}

function animate(time) {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    if (time - lastDayUpdate > MS_PER_DAY) {
        simDate.setDate(simDate.getDate() + 1);
        updateCalendar();
        handleDailyLaunches(centerX, centerY);
        lastDayUpdate = time;
    }

    const sunRadius = SUN_BASE_RADIUS * scaleFactor;
    const sunGlow = ctx.createRadialGradient(centerX, centerY, 5 * scaleFactor, centerX, centerY, sunRadius * 2.5);
    sunGlow.addColorStop(0, 'rgba(255, 240, 0, 0.6)');
    sunGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = sunGlow;
    ctx.beginPath(); ctx.arc(centerX, centerY, sunRadius * 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(centerX, centerY, sunRadius, 0, Math.PI * 2); ctx.fill();

    planets.forEach(p => {
        p.angle += (ORBIT_SPEED / (p.period / 365));
        const orbitDist = p.dist * scaleFactor;
        const px = centerX + Math.cos(p.angle) * orbitDist;
        const py = centerY + Math.sin(p.angle) * orbitDist;
        ctx.strokeStyle = '#1a1a1a';
        ctx.beginPath(); ctx.arc(centerX, centerY, orbitDist, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(px, py, p.radius * scaleFactor, 0, Math.PI * 2); ctx.fill();
    });

    rockets = rockets.filter(r => r.status === 'ACTIVE');
    rockets.forEach(r => { r.update(); r.draw(); });
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    activeEl.innerText = rockets.length;
    failedEl.innerText = totalFailures;
    colonistEl.innerText = totalColonists.toLocaleString();
    earthPopEl.innerText = Math.floor(earthPopulation).toLocaleString();

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
